{% set version = "0.25.0" %}

package:
  name: typer-split
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/t/typer/typer-{{ version }}.tar.gz
  sha256: 123eaf9f19bb40fd268310e12a542c0c6b4fab9c98d9d23342a01ff95e3ce930

build:
  number: 0
  skip: true  # [py<310]

requirements:
  host:
    - python
  run:
    - python

outputs:
  - name: typer
    script: build.sh  # [not win]
    script: bld.bat  # [win]
    build:
      entry_points:
        - typer = typer.cli:main
    requirements:
      host:
        - pdm-backend
        - pip
        - python
      run:
        - python
        - annotated-doc >=0.0.2
        - click >=8.2.1
        - rich >=13.8.0
        - shellingham >=1.3.0
    test:
      source_files:
        - tests/
        - docs_src/
      imports:
        - typer
      requires:
        - pip
        - coverage
        - pytest
        - python
      commands:
        - pip check
        - typer --version
        - typer --help
        - coverage run --source=typer --branch -m pytest -vv --color=yes --tb=long -k "not ((multiple_values and main) or completion or invalid_score)"
        - coverage report --show-missing --skip-covered --fail-under=66

about:
  home: https://pypi.org/project/typer
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Typer, build great CLIs. Easy to code. Based on Python type hints.

  description: |
    Typer is library for building CLI applications that users will love using and developers will love creating. Based on Python type hints.

    The key features are:

    Intuitive to write: Great editor support. Completion everywhere. Less time debugging. Designed to be easy to use and learn. Less time reading docs.
    Easy to use: It's easy to use for the final users. Automatic help, and automatic completion for all shells.
    Short: Minimize code duplication. Multiple features from each parameter declaration. Fewer bugs.
    Start simple: The simplest example adds only 2 lines of code to your app: 1 import, 1 function call.
    Grow large: Grow in complexity as much as you want, create arbitrarily complex trees of commands and groups of subcommands, with options and arguments.

  doc_url: https://typer.tiangolo.com
  dev_url: https://github.com/fastapi/typer

extra:
  recipe-maintainers:
    - dfornika
    - bollwyvl
